<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日割りダイエット</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- 初回設定画面 -->
        <div id="setupScreen" class="screen">
            <div class="setup-wrapper">
                <div class="setup-container">
                    <div class="setup-title-row">
                        <h1>目標設定</h1>
                        <button id="backToCalendar" class="back-btn-outside">カレンダー</button>
                    </div>
                
                    <div class="input-group">
                        <label>現在体重</label>
                        <div class="input-wrapper">
                            <input type="number" id="currentWeight" step="0.01" placeholder="60.0" max="999.99" min="0">
                            <span class="unit">kg</span>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>開始日</label>
                        <input type="date" id="startDate">
                    </div>
                    
                    <div class="input-group">
                        <label>目標体重</label>
                        <div class="input-wrapper">
                            <input type="number" id="targetWeight" step="0.01" placeholder="55.0" max="999.99" min="0">
                            <span class="unit">kg</span>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>終了日</label>
                        <input type="date" id="targetDate">
                    </div>
                    
                    <button id="setupBtn" class="primary-btn">決定</button>
                    
                    <p class="note">※ 設定は後で変更できます</p>
                </div>
            </div>
        </div>

        <!-- カレンダー画面 -->
        <div id="calendarScreen" class="screen hidden">
            <div class="calendar-header">
                <button id="prevMonth" class="nav-btn">◀</button>
                <div class="month-info">
                    <h2 id="currentMonth"></h2>
                    <p id="dailyGoal" class="daily-goal"></p>
                </div>
                <button id="nextMonth" class="nav-btn">▶</button>
                <button id="settingsBtn" class="settings-btn-inline">設定</button>
            </div>
            
            <div class="calendar-container">
                <div id="calendarGrid" class="calendar-grid"></div>
            </div>
        </div>

        <!-- 設定メニューモーダル -->
        <div id="settingsModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>設定</h3>
                    <button id="closeSettings" class="close-btn">✕</button>
                </div>
                <div class="modal-body">
                    <button id="goToTargetSettings" class="primary-btn">目標体重設定</button>
                    <button id="showHelp" class="primary-btn" style="margin-top: 15px;">操作説明</button>
                </div>
            </div>
        </div>

        <!-- 操作説明モーダル -->
        <div id="helpModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>操作説明</h3>
                    <button id="closeHelp" class="close-btn">✕</button>
                </div>
                <div class="modal-body">
                    <div class="help-content">
                        <p>日割りダイエットは、目標体重までの減量を日割りで管理するアプリです。</p>
                        <br>
                        <p><strong>カレンダーの色について：</strong></p>
                        <ul>
                            <li>🟦 <strong>青色</strong>：体重を入力して目標達成した日</li>
                            <li>🟥 <strong>赤色</strong>：体重を入力したが目標未達成の日</li>
                            <li>🟨 <strong>黄色</strong>：終了日</li>
                        </ul>
                        <br>
                        <p>日付をタップして毎日の体重を記録しましょう！</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 体重入力モーダル -->
        <div id="weightModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalDate"></h3>
                    <button id="closeModal" class="close-btn">✕</button>
                </div>
                <div class="modal-body">
                    <div id="modalTargetWeight" class="modal-target-weight"></div>
                    <div class="input-group">
                        <label>体重</label>
                        <div class="input-wrapper">
                            <input type="number" id="weightInput" step="0.01" placeholder="60.0" max="999.99" min="0">
                            <span class="unit">kg</span>
                        </div>
                    </div>
                    <button id="saveWeight" class="primary-btn">保存</button>
                    <button id="deleteWeight" class="secondary-btn hidden">削除</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
